<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baitul Hikmah - Book Checkout</title>
    <link rel="stylesheet" href="azki.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo"><h2>Baitul Hikmah</h2></div>
        <nav>
            <a href="">Home</a>
            <span class="nav-separator">|</span>
            <a href="">Catalogue</a>
            <span class="nav-separator">|</span>
            <a href="">About</a>
        </nav>
    </header>

    <main>
        <h1 id="book-title">Book title</h1>

        <div class="content-wrapper">
            <!-- Left side: Form -->
            <div class="form-section">
                <form class="checkout-form">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="matric">Matric Number :</label>
                        <input type="text" id="matric" name="matric" required>
                    </div>

                    <div class="form-group">
                        <label for="borrow-date">Borrow Date:</label>
                        <input type="date" id="borrow-date" name="borrow-date" required>
                    </div>

                    <div class="form-group">
                        <label for="return-date">Return Date:</label>
                        <input type="date" id="return-date" name="return-date" required>
                    </div>

                    <div class="button-container">
                        <button type="submit" class="checkout-btn">Checkout now</button>
                    </div>
                </form>
            </div>

            <!-- Right side: Book Image -->
            <div class="book-image-section">
                <img id="book-image" src="" alt="Book Cover">
            </div>
        </div>
    </main>

    <script>
        // Get book data from URL parameters
        // Usage: checkout.html?book=The%20Great%20Gatsby&image=book-cover.jpg
        const urlParams = new URLSearchParams(window.location.search);
        const bookTitle = urlParams.get('book');
        const bookImage = urlParams.get('image');

        if (bookTitle) {
            document.getElementById('book-title').textContent = decodeURIComponent(bookTitle);
        }

        if (bookImage) {
            document.getElementById('book-image').src = decodeURIComponent(bookImage);
        } else {
            // Default placeholder if no image provided
            document.getElementById('book-image').alt = "Book cover not available";
        }
    </script>

</body>
</html>
