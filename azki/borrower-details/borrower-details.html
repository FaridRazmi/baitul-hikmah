<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borrower Details – Baitul Hikmah</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../shared/navbar.css" />
    <link rel="stylesheet" href="borrower-details.css" />
    <script src="../../shared/grayscale.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body>
    <!-- navbar start -->
    <div class="navbar">
      <div class="nav-brand">
        <h2>Baitul Hikmah</h2>
        <div
          class="hamburger"
          onclick="
            document.querySelector('.nav-menu').classList.toggle('active')
          "
        >
          <i data-feather="menu"></i>
        </div>
      </div>
      <div class="nav-menu">
        <div class="nav-links">
          <a href="../../hadif/homepage.html">Home</a>
          <a href="../../farid/catalogue/catalogue.html">Catalogue</a>
          <a href="../../adib/aboutUs.html">About Us</a>
        </div>
        <div class="nav-right">
          <a href="../farid/catalogue/bag.html" class="bag-icon-link">
            <i
              data-feather="shopping-bag"
              style="width: 20px; height: auto"
            ></i>
          </a>
        </div>
      </div>
    </div>
    <hr />
    <!-- navbar end -->

    <div class="page-content">
      <h1>Borrower Details</h1>
      <div class="details-box">
        <p>Please fill in your information before proceeding to checkout.</p>

        <div class="form-group">
          <label for="borrowerName">Full Name</label>
          <input
            type="text"
            id="borrowerName"
            placeholder="e.g. ali bin abu"
            required
          />
        </div>

        <div class="form-group">
          <label for="matricNo">Matric No.</label>
          <input
            type="number"
            id="matricNo"
            placeholder="e.g. 256967"
            min="0"
            max="999999"
            required
          />
        </div>

        <div class="form-group">
          <label for="borrowDate">Date of Borrow</label>
          <input
            type="text"
            id="borrowDate"
            placeholder="DD/MM/YY"
            maxlength="8"
            required
          />

          <ul>
            <li>Enter the date that the books will be borrowed.</li>
            <li>Any wrong information will be reviewed by the librarian.</li>
          </ul>
        </div>

        <button class="proceed-btn" onclick="proceedToCheckout()">
          Proceed to Checkout
        </button>
      </div>
    </div>

    <script src="borrower-details.js"></script>
  </body>
</html>
