<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogue – Baitul Hikmah</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../shared/navbar.css" />
    <link rel="stylesheet" href="catalogue.css" />
    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body>
    <!-- navbar start -->
    <div class="navbar">
      <div class="nav-brand">
        <h2>Baitul Hikmah</h2>

        <!-- Mobile toolbar: search + filter + hamburger -->
        <div class="mobile-toolbar">
          <select id="categoryFilterMobile" class="filter">
            <option value="all">All</option>
              <option value="Science Fiction">Sci-Fi</option>
              <option value="Fantasy">Fantasy</option>
              <option value="Mystery">Mystery</option>
              <option value="Technology">Tech</option>
            </div>
          </select>
          <form class="search" onsubmit="event.preventDefault()">
            <input
              type="text"
              id="searchInputMobile"
              name="q"
              placeholder="Search…"
              autocomplete="off"
            />
            <button type="submit">
              <i data-feather="search" style="width: 14px; height: auto"></i>
            </button>
          </form>
          <div class="hamburger" id="hamburgerBtn">
            <i data-feather="menu"></i>
          </div>
        </div>
      </div>

      <div class="nav-menu" id="navMenu">
        <div class="nav-links">
          <a href="../../hadif/homepage.html">Home</a>
          <a href="catalogue.html">Catalogue</a>
          <a href="../../adib/aboutUs.html">About Us</a>
        </div>
        <div class="nav-right">
          <select id="categoryFilter" class="filter">
            <option value="all">All Categories</option>
            <option value="Science Fiction">Science Fiction</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Mystery">Mystery</option>
            <option value="Technology">Technology</option>
          </select>
          <form class="search" onsubmit="event.preventDefault()">
            <input
              type="text"
              id="searchInput"
              name="q"
              placeholder="search"
              autocomplete="off"
            />
            <button type="submit">
              <i data-feather="search" style="width: 15px; height: auto"></i>
            </button>
          </form>
          <a href="bag.html" class="bag-icon-link">
            <i
              data-feather="shopping-bag"
              style="width: 20px; height: auto"
            ></i>
          </a>
        </div>
      </div>
    </div>
    <hr />
    <!-- navbar end -->

    <!-- Results count + pagination wrapper -->
    <div class="catalogue-toolbar">
      <p id="resultsCount" class="results-count"></p>
    </div>

    <div id="bookContainer"></div>

    <!-- Pagination controls -->
    <div class="pagination" id="pagination"></div>

    <!-- FOOTER -->
    <footer id="contact">
      <div class="footer-logo">Baitul Hikmah</div>
      <p>Knowledge is the light that guides us from cradle to grave.</p>
      <p class="copyright">
        © 2026 Baitul Hikmah Library. All rights reserved.
      </p>
    </footer>

    <script src="../../shared/grayscale.js"></script>
    <script src="catalogue.js"></script>
    <script>
      feather.replace();
      // Hamburger toggle
      document
        .getElementById("hamburgerBtn")
        .addEventListener("click", function () {
          document.getElementById("navMenu").classList.toggle("active");
        });
    </script>
  </body>
</html>
