<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogue – Baitul Hikmah</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="catalogue.css" />
    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body>
    <!-- navbar start -->
    <div class="navbar">
      <div class="nav-brand">
        <h2>Baitul Hikmah</h2>
        <div class="hamburger" onclick="document.querySelector('.nav-menu').classList.toggle('active')">
          <i data-feather="menu"></i>
        </div>
      </div>
      <div class="nav-menu">
        <div class="nav-links">
          <a href="../../hadif/homepage.html">Home</a>
          <a href="catalogue.html">Catalogue</a>
          <a href="../../adib/aboutUs.html">About Us</a>
        </div>
        <div class="nav-right">
          <select id="categoryFilter" class="filter">
            <option value="all">All Categories</option>
            <option value="Science Fiction">Science Fiction</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Mystery">Mystery</option>
            <option value="Technology">Technology</option>
          </select>
          <form class="search" onsubmit="event.preventDefault();">
            <input type="text" id="searchInput" name="q" placeholder="search" autocomplete="off" />
            <button type="submit">
              <i data-feather="search" style="width: 15px; height: auto"></i>
            </button>
          </form>
          <a href="bag.html" class="bag-icon-link">
            <i data-feather="shopping-bag" style="width: 20px; height: auto"></i>
          </a>
        </div>
      </div>
    </div>
    <hr />
    <!-- navbar end -->

    <div id="bookContainer"></div>

    <script src="catalogue.js"></script>
    <script>feather.replace();</script>
  </body>
</html>
