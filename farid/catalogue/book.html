<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="book.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
      .navbar a.bag-icon-link::after { display: none; }
    </style>
  </head>
  <body>
    <!-- navbar start -->
    <div class="navbar">
      <div class="nav-brand">
        <h2>Baitul Hikmah</h2>
        <div class="hamburger" onclick="document.querySelector('.nav-menu').classList.toggle('active')">
          <i data-feather="menu"></i>
        </div>
      </div>
      <div class="nav-menu">
        <div class="nav-links">
          <a href="#home">Home</a>
          <a href="#about">About</a>
        </div>
        <div class="nav-right">
          <select class="filter" onchange="alert('Filtering by: ' + this.value)">
            <option value="all">All Categories</option>
            <option value="Science Fiction">Science Fiction</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Mystery">Mystery</option>
            <option value="Technology">Technology</option>
          </select>
          <form
            class="search"
            onsubmit="
              event.preventDefault();
              if (this.q.value) alert('Searching for: ' + this.q.value);
            "
          >
            <input type="text" name="q" placeholder="search" autocomplete="off" />
            <button type="submit">
              <i data-feather="search" style="width: 15px; height: auto"></i>
            </button>
          </form>
          <a href="bag.html" class="bag-icon-link" style="color: var(--tulisan); margin-left: 10px;">
             <i data-feather="shopping-bag" style="width: 20px; height: auto"></i>
          </a>
        </div>
      </div>
    </div>
    <hr />
    <!-- navabar end -->
    <!-- hero start -->

    <div id="bookDetail"></div>
    <!-- hero end -->
  </body>
  <script src="book.js"></script>
  <script>
    feather.replace();
  </script>
</html>
