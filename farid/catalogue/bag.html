<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Bag</title>
    <link rel="stylesheet" href="catalogue.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
      .navbar a.bag-icon-link::after { display: none; }
      .bag-header { text-align: center; color: var(--primary); margin-top: 30px; }
      .empty-bag { text-align: center; color: var(--primary); margin-top: 50px; font-size: 1.2rem; }
    </style>
  </head>
  <body>
    <!-- navbar start -->
    <div class="navbar">
      <div class="nav-brand">
        <h2>Baitul Hikmah</h2>
        <div class="hamburger" onclick="document.querySelector('.nav-menu').classList.toggle('active')">
          <i data-feather="menu"></i>
        </div>
      </div>
      <div class="nav-menu">
        <div class="nav-links">
          <a href="catalogue.html#home">Home</a>
          <a href="catalogue.html#about">About</a>
        </div>
        <div class="nav-right">
          <a href="bag.html" class="bag-icon-link" style="color: var(--side); margin-left: 10px;">
             <i data-feather="shopping-bag" style="width: 20px; height: auto"></i>
          </a>
        </div>
      </div>
    </div>
    <hr />
    <!-- navabar end -->

    <h2 class="bag-header">Your Bag</h2>
    <div id="bookContainer"></div>
    <div id="checkoutContainer" style="text-align: center; margin-top: 30px; margin-bottom: 30px;"></div>

    <script>
      feather.replace();

      function loadBag() {
        let bag = JSON.parse(localStorage.getItem('bag')) || [];
        const container = document.getElementById("bookContainer");
        
        if (bag.length === 0) {
          container.innerHTML = "<p class='empty-bag'>Your bag is empty. <a href='catalogue.html'>Browse books</a></p>";
          document.getElementById("checkoutContainer").innerHTML = "";
          return;
        }

        fetch("../data/books.json")
          .then(res => res.json())
          .then(data => {
            const bagBooks = data.filter(book => bag.includes(book.id));
            container.innerHTML = "";
            bagBooks.forEach(book => {
              container.innerHTML += `
                  <div class="book-card">
                      <img src="${book.image}">
                      <h3>${book.title}</h3>
                      <p>${book.author}</p>
                      <button onclick="removeFromBag(${book.id})">Remove</button>
                  </div>
              `;
            });
            document.getElementById("checkoutContainer").innerHTML = `
              <a href="azki.html">
                <button style="padding: 10px 20px; background-color: var(--primary); color: var(--side); border: none; border-radius: 5px; font-size: 1.1rem; cursor: pointer; margin: 20px;">Borrow Now</button>
              </a>
            `;
          });
      }

      window.removeFromBag = function(bookId) {
        let bag = JSON.parse(localStorage.getItem('bag')) || [];
        bag = bag.filter(id => id !== bookId);
        localStorage.setItem('bag', JSON.stringify(bag));
        loadBag();
      }

      loadBag();
    </script>
  </body>
</html>
